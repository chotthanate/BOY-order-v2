name: Apply Codex index patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-apply-index-patch.yml

permissions:
  contents: write

jobs:
  apply-index-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch and remove temporary files
        run: |
          git apply --whitespace=nowarn codex/index.patch
          rm -f codex/index.patch .github/workflows/codex-apply-index-patch.yml
          rmdir codex 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html codex/index.patch .github/workflows/codex-apply-index-patch.yml
          git commit -m "Harden autosave draft handling"
          git push
