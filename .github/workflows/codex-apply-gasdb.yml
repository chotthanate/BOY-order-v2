name: Codex Apply GAS Database Fix

on:
  push:
    paths:
      - 'codex/gasdb.patch'
      - '.github/workflows/codex-apply-gasdb.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-gasdb:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply patch and clean up
        run: |
          git apply --whitespace=nowarn codex/gasdb.patch
          rm -f codex/gasdb.patch
          rmdir codex 2>/dev/null || true
          rm -f .github/workflows/codex-apply-gasdb.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git add -A codex .github/workflows/codex-apply-gasdb.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Save master database through Apps Script"
          git push
